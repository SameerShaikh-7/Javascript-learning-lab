<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App With Poster</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        /* Inputs */
        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            padding: 10px 18px;
            margin: 8px 5px 8px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .add-btn {
            background: #00c853;
            color: white;
        }

        .edit-btn {
            background: #ff9800;
            color: white;
        }

        .delete-btn {
            background: #f44336;
            color: white;
        }

        /* Movie Grid */
        #movieList {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Movie Card */
        .movie {
            background: #1e1e2f;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .movie:hover {
            transform: translateY(-5px);
        }

        .movie img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-details {
            padding: 15px;
        }

        .movie-details h3 {
            margin-bottom: 8px;
            font-size: 18px;
        }

        .movie-details p {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .movie-details button {
            font-size: 13px;
            padding: 6px 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Movie App</h1>

        <input type="text" id="movieName" placeholder="Enter Movie Name">
        <textarea id="movieDesc" placeholder="Enter Movie Description"></textarea>
        <input type="file" id="moviePoster" accept="image/*">
        <button class="add-btn" onclick="addMovie()">Add Movie</button>

        <input type="text" id="search" placeholder="Search Movie..." onkeyup="searchMovie()">

        <div id="movieList"></div>
    </div>

    <script src="script.js"></script>

</body>

</html>
